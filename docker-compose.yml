# Kaidex — Local Development
# Usage: docker-compose up -d

services:
  # PostgreSQL database
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: kaidex
      POSTGRES_USER: kaidex
      POSTGRES_PASSWORD: kaidex_dev_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kaidex"]
      interval: 10s
      timeout: 5s
      retries: 5

  # NestJS API
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://kaidex:kaidex_dev_password@db:5432/kaidex?schema=public
      PORT: 4000
      NODE_ENV: development
      FRONTEND_URL: http://localhost:3000
      ENCRYPTION_KEY: dev-encryption-key-change-in-production
      NEXTAUTH_SECRET: dev-secret-change-in-production-use-openssl-rand-base64-32
    ports:
      - "4000:4000"

volumes:
  pgdata:
